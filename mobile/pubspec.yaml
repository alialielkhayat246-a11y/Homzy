name: homzy
description: Homzy — bilingual AI property advisor (mobile app).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.8.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App launcher icon (the Homzy house mark). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/homzy_icon.png"
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/icon/homzy_icon_fg.png"
