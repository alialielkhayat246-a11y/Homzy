name: Deploy Web (GitHub Pages)

# Builds the Homzy Flutter app for the web and publishes it to GitHub Pages,
# so the full app (auth + projects + chat) is testable from a browser link.

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Add web platform (generates web/ without touching lib/)
        run: flutter create --platforms web --project-name homzy .
      - run: flutter pub get
      - name: Build web
        run: >
          flutter build web --release
          --base-href=/Homzy/
          --dart-define=HOMZY_API=https://homzy-jet.vercel.app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
