<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homzy — Your Home Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #0D1B2A;
    --blue:   #2563EB;
    --blue-2: #E0F2FE;
    --green:  #22C55E;
    --gray:   #F3F4F6;
    --line:   #E6E8EC;
    --muted:  #6B7280;
    --text:   #0D1B2A;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Poppins", "Cairo", "Segoe UI", Tahoma, Arial, sans-serif;
    background: var(--gray); color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  .app {
    width: 100%; max-width: 460px; height: 100vh; max-height: 880px;
    background: #fff; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(13,27,42,.14);
    border-radius: 0; overflow: hidden;
  }

  /* Header */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; background: #fff; border-bottom: 1px solid var(--line);
  }
  .mark { width: 38px; height: 38px; flex: none; display: flex; }
  .brand-text .title { font-weight: 700; font-size: 18px; line-height: 1.1; }
  .brand-text .sub { font-size: 12px; color: var(--muted); }
  .status {
    margin-left: auto; font-size: 11px; font-weight: 600; color: #fff;
    padding: 5px 11px; border-radius: 20px; background: var(--muted);
    white-space: nowrap;
  }
  .status.ai { background: var(--green); }
  .status.template { background: #E8A33D; }
  .status.offline { background: #9aa1ac; }

  /* Chat log */
  #log {
    flex: 1; overflow-y: auto; padding: 18px 16px;
    display: flex; flex-direction: column; gap: 14px;
    background:
      radial-gradient(120% 60% at 50% 0%, #fafbff 0%, var(--gray) 60%);
  }
  .row { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; }
  .row.user { justify-content: flex-end; }
  .avatar { width: 34px; height: 34px; flex: none; }
  .bubble {
    max-width: 80%; padding: 11px 14px; font-size: 15px; line-height: 1.55;
    white-space: pre-wrap; word-wrap: break-word; border-radius: 18px;
  }
  .row.bot .bubble {
    background: #fff; border: 1px solid var(--line); color: var(--navy);
    border-bottom-left-radius: 6px;
    box-shadow: 0 2px 6px rgba(13,27,42,.04);
  }
  .row.user .bubble {
    background: var(--blue); color: #fff; border-bottom-right-radius: 6px;
  }
  .bubble.rtl { direction: rtl; text-align: right; }

  /* Quick-reply chips */
  .chips { display: flex; flex-direction: column; gap: 9px; padding: 2px 0 2px 42px; }
  .chip {
    display: inline-flex; align-items: center; gap: 9px;
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 11px 14px; font: inherit; font-size: 14px; font-weight: 500;
    color: var(--navy); cursor: pointer; text-align: left; width: fit-content;
    transition: border-color .15s, background .15s, transform .05s;
  }
  .chip:hover { border-color: var(--blue); background: #f7faff; }
  .chip:active { transform: scale(.98); }
  .chip .ic { font-size: 16px; }

  /* Typing indicator */
  .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 14px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #c3c9d2; animation: blink 1.3s infinite; }
  .dot:nth-child(2){ animation-delay:.2s } .dot:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{ opacity:.3 } 40%{ opacity:1 } }

  /* Notice (engine status) */
  .notice {
    font-size: 12px; color: #8a6d3b; background: #fff7e6;
    border-top: 1px solid #f3e2bf; padding: 7px 16px; text-align: center;
    display: none;
  }
  .notice.show { display: block; }

  /* Input */
  form { display: flex; gap: 10px; align-items: center; padding: 12px 14px 6px; background: #fff; }
  #msg {
    flex: 1; border: 1px solid var(--line); background: var(--gray);
    border-radius: 24px; padding: 12px 18px; font: inherit; font-size: 15px; outline: none;
  }
  #msg:focus { border-color: var(--blue); background: #fff; }
  .send {
    width: 46px; height: 46px; flex: none; border: none; border-radius: 50%;
    background: var(--blue); color: #fff; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .send:hover { background: #1d4fd7; }
  .send:disabled { opacity: .5; cursor: default; }
  .disclaimer { font-size: 11px; color: var(--muted); text-align: center; padding: 4px 16px 12px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="mark">
      <svg viewBox="0 0 64 64" width="38" height="38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 56 V28 L32 10 L54 28 V56" stroke="#0D1B2A" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
        <rect x="24" y="34" width="7" height="7" rx="1.5" fill="#2563EB"/>
        <rect x="33" y="34" width="7" height="7" rx="1.5" fill="#2563EB"/>
        <rect x="24" y="43" width="7" height="7" rx="1.5" fill="#2563EB"/>
        <rect x="33" y="43" width="7" height="7" rx="1.5" fill="#2563EB"/>
      </svg>
    </span>
    <div class="brand-text">
      <div class="title" id="brandTitle">Homzy</div>
      <div class="sub" id="brandSub">Your Home Guide</div>
    </div>
    <div class="status" id="status">…</div>
  </header>

  <div id="log"></div>

  <div class="notice" id="notice"></div>

  <form id="form">
    <input id="msg" autocomplete="off" placeholder="Type your message…   /   اكتب رسالتك…" />
    <button type="submit" class="send" id="send" aria-label="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.4 20.4 21 12 3.4 3.6 3.4 10.2 15 12 3.4 13.8 Z" fill="currentColor"/>
      </svg>
    </button>
  </form>
  <div class="disclaimer">Homzy can make mistakes. Please verify important info.</div>
</div>

<script>
  const log = document.getElementById('log');
  const form = document.getElementById('form');
  const input = document.getElementById('msg');
  const sendBtn = document.getElementById('send');
  const statusEl = document.getElementById('status');
  const noticeEl = document.getElementById('notice');
  const sessionId = 'sess-' + Math.random().toString(36).slice(2);

  const isArabic = (t) => /[؀-ۿ]/.test(t || '');

  const AVATAR = `
    <svg class="avatar" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="32" fill="#0D1B2A"/>
      <path d="M17 49 V31 L32 19 L47 31 V49" stroke="#fff" stroke-width="5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <rect x="26" y="34" width="5.5" height="5.5" rx="1" fill="#2563EB"/>
      <rect x="32.5" y="34" width="5.5" height="5.5" rx="1" fill="#2563EB"/>
      <rect x="26" y="40.5" width="5.5" height="5.5" rx="1" fill="#2563EB"/>
      <rect x="32.5" y="40.5" width="5.5" height="5.5" rx="1" fill="#2563EB"/>
    </svg>`;

  function addBubble(text, who) {
    const row = document.createElement('div');
    row.className = 'row ' + who;
    const rtl = isArabic(text) ? ' rtl' : '';
    if (who === 'bot') {
      row.innerHTML = AVATAR + `<div class="bubble${rtl}"></div>`;
      row.querySelector('.bubble').textContent = text;
    } else {
      const b = document.createElement('div');
      b.className = 'bubble' + rtl;
      b.textContent = text;
      row.appendChild(b);
    }
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  const CHIPS = [
    { ic: '🏠', label: 'I want to rent',            send: "I'm looking to rent" },
    { ic: '🔑', label: 'I want to buy',             send: "I'm looking to buy" },
    { ic: '📍', label: 'Options in Sheikh Zayed',   send: "Show me options in Sheikh Zayed" },
    { ic: '🏙️', label: 'Options in 6th of October', send: "Show me options in 6th of October" },
  ];

  function renderChips() {
    const wrap = document.createElement('div');
    wrap.className = 'chips';
    wrap.id = 'chips';
    CHIPS.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.innerHTML = `<span class="ic">${c.ic}</span><span>${c.label}</span>`;
      btn.onclick = () => { removeChips(); sendMessage(c.send); };
      wrap.appendChild(btn);
    });
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }
  function removeChips() { const c = document.getElementById('chips'); if (c) c.remove(); }

  async function sendMessage(text) {
    text = (text || '').trim();
    if (!text) return;
    removeChips();
    addBubble(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const typing = document.createElement('div');
    typing.className = 'row bot typing';
    typing.innerHTML = AVATAR + '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    log.appendChild(typing);
    log.scrollTop = log.scrollHeight;

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text })
      });
      const data = await r.json();
      typing.remove();
      addBubble(data.reply || '(no reply)', 'bot');
    } catch (err) {
      typing.remove();
      addBubble('Connection error — is the server running?', 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => { e.preventDefault(); sendMessage(input.value); });

  async function init() {
    let h = {};
    try {
      h = await (await fetch('/api/health')).json();
    } catch (e) {
      statusEl.textContent = 'offline';
      statusEl.className = 'status offline';
    }
    if (h.brand) document.getElementById('brandTitle').textContent = h.brand;
    if (h.mode) {
      statusEl.textContent = h.mode === 'ai' ? 'AI · ' + h.provider : 'Preview';
      statusEl.className = 'status ' + (h.mode === 'ai' ? 'ai' : 'template');
    }
    if (h.detail) { noticeEl.textContent = h.detail; noticeEl.classList.add('show'); }

    const broker = h.broker || 'your advisor';
    const brand = h.brand || 'Homzy';
    addBubble(
      `Hi! I'm ${broker} from ${brand} 👋\nLooking to rent or buy? Tell me your budget, area and bedrooms and I'll find the best matches.\n\n` +
      `أهلاً! أنا ${broker} من ${brand} 👋\nبتدوّر على إيجار ولا تمليك؟ قوللي ميزانيتك، المنطقة، وعدد الغرف وأجيبلك أنسب الوحدات.`,
      'bot'
    );
    renderChips();
  }

  init();
</script>
</body>
</html>
